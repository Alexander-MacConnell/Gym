<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 25th Birthday love!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card-shell">
    <section class="card">
      <p class="eyebrow">SpongeBob vibes are embedded in this card</p>
      <h1>Hi love, you know what’s funnier than 24?</h1>
      <div class="big-number">25</div>
      <p class="message">
        Happy 25th birthday love, watch the video below for fun and then click the button to read the rest of the card.
      </p>

      <button class="reveal-button" id="revealButton" type="button">To the rest of the card!</button>

      <section class="song-section">
        <h2>Fun Video :)</h2>
        <div class="video-placeholder">
          <video controls preload="metadata" playsinline>
            <source src="birthday_song.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
